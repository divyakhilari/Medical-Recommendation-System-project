<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>All Recommendations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>All Recommendations</h2>

  <table class="table table-striped table-hover table-bordered shadow-sm mt-3">
    <thead class="table-dark">
      <tr>
        <th>Patient</th>
        <th>Disease</th>
        <th>Created</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      {% for r in recs %}
      <tr>
        <td>{{ r.patient.name }} (ID: {{ r.patient_id }})</td>
        <td>{{ r.disease }}</td>
        <td>{{ r.created_at.strftime("%Y-%m-%d %H:%M") }}</td>
        <td>
          <a class="btn btn-sm btn-outline-primary" href="{{ url_for('patient_recommendations', patient_id=r.patient_id) }}">View</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <a class="btn btn-secondary" href="{{ url_for('index') }}">Back to Home</a>
</div>
</body>
</html>
