<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            animation: fadeIn 2s ease-in-out;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 420px;
            animation: slideUp 1.5s ease;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            animation: glow 2s infinite alternate;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .input-group i {
            margin-right: 10px;
            color: #74ebd5;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .input-group:hover i {
            transform: rotate(10deg) scale(1.2);
        }

        .input-group input, .input-group select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #74ebd5;
            box-shadow: 0 0 8px rgba(116,235,213,0.6);
            transform: scale(1.02);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: linear-gradient(135deg, #ACB6E5, #74ebd5);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        /* Animations */
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes slideUp { from {transform: translateY(50px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
        @keyframes glow { from {color: #333;} to {color: #74ebd5;} }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fa-solid fa-user-plus"></i> Register Patient</h2>
        <form method="POST">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-venus-mars"></i>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-calendar"></i>
                <input type="date" name="birth_date" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-droplet"></i>
                <input type="text" name="blood_group" placeholder="Blood Group" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-home"></i>
                <input type="text" name="address" placeholder="Address" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" name="location" placeholder="Location" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit"><i class="fa-solid fa-check"></i> Register</button>
        </form>
    </div>
</body>
</html>
