<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>New Recommendation for {{ patient.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .chip-input .form-control { margin-bottom: 8px; }
    .hint { font-size: 0.9rem; color: #6c757d; }
  </style>
</head>
<body class="bg-light">
<div class="container mt-4">
  <h2>New Recommendation — {{ patient.name }}</h2>

  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Disease *</label>
            <input type="text" name="disease" class="form-control" required>
          </div>
          <div class="col-md-12">
            <label class="form-label">Description *</label>
            <textarea name="description" class="form-control" rows="3" required></textarea>
          </div>

          <div class="col-md-6 chip-input">
            <label class="form-label">Precautions (add multiple)</label>
            <input type="text" name="precautions" class="form-control" placeholder="e.g., Stay hydrated">
            <input type="text" name="precautions" class="form-control" placeholder="e.g., Avoid heavy meals">
          </div>

          <div class="col-md-6 chip-input">
            <label class="form-label">Medications (general info)</label>
            <input type="text" name="medications" class="form-control" placeholder="e.g., Pain reliever (general)">
            <input type="text" name="medications" class="form-control" placeholder="e.g., Antacid (general)">
          </div>

          <div class="col-md-6 chip-input">
            <label class="form-label">Workout (general)</label>
            <input type="text" name="workout" class="form-control" placeholder="e.g., Light walking 20 min">
            <input type="text" name="workout" class="form-control" placeholder="e.g., Stretching">
          </div>

          <div class="col-md-6 chip-input">
            <label class="form-label">Diet (general)</label>
            <input type="text" name="diet" class="form-control" placeholder="e.g., High-fiber foods">
            <input type="text" name="diet" class="form-control" placeholder="e.g., Low sugar">
          </div>
        </div>

        <p class="hint mt-2">Note: Entries here are general informational items — not prescriptions.</p>

        <div class="mt-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="{{ url_for('patient_recommendations', patient_id=patient.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <a class="btn btn-link mt-3" href="{{ url_for('patient_recommendations', patient_id=patient.id) }}">Back to Recommendations</a>
</div>
</body>
</html>
