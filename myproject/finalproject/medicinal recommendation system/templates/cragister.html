<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>📝 Patient Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Animated gradient background */
    body {
      background: linear-gradient(-45deg, #84fab0, #8fd3f4, #fccb90, #fdc094);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes gradientShift {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    /* Card styling with hover animation */
    .card {
      border-radius: 15px;
      animation: fadeInUp 1s ease;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 15px 30px rgba(0,0,0,0.25);
    }
    @keyframes fadeInUp {
      from {opacity: 0; transform: translateY(40px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Heading animation */
    h2 {
      font-weight: bold;
      color: #333;
      animation: slideDown 1.2s ease;
    }
    @keyframes slideDown {
      from {opacity: 0; transform: translateY(-20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* Input glow effect */
    .form-control {
      border-radius: 8px;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    .form-control:focus {
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
      transform: scale(1.02);
    }

    /* Button ripple + hover */
    .btn-primary {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    .btn-primary:hover {
      background-color: #2e7d32;
      transform: scale(1.05);
    }
    .btn-primary::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      width: 100px;
      height: 100px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.8s ease;
    }
    .btn-primary:active::after {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* Flash messages animation */
    .alert {
      animation: bounceIn 0.8s ease;
      border-radius: 10px;
    }
    @keyframes bounceIn {
      0% {transform: scale(0.8); opacity: 0;}
      60% {transform: scale(1.05); opacity: 1;}
      100% {transform: scale(1);}
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4 text-center">📝 Patient Registration</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }}">✨ {{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" class="card p-4 shadow-sm">
      <div class="mb-3">
        <label class="form-label">👤 Full name</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">📧 Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">🔑 Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100">🚀 Create account</button>
      <p class="mt-3 text-center">Already have an account? <a href="{{ url_for('login') }}">🔐 Log in</a></p>
    </form>
  </div>
</body>
</html>
